/* inputs */
input, textarea, select{
    width:100%;
    margin:4px 0;
    padding:6px;
}

/* labels */
label{
    font-size:14px;
}

/* 🔽 reduce space between radio/checkbox */
.reason label{
    margin:2px 0;
}

.reason input{
    margin-right:4px;
}

/* button */
button{
    margin-top:8px;
    padding:6px;
}
/* 📱 MOBILE RESPONSIVE */
@media (max-width: 768px){

    body{
        padding: 10px;
    }

    /* container */
    .container{
        width:100%;
    }

    /* FORM */
    form{
        width:100%;          /* full width on phone */
        padding:15px;
    }

    /* inputs */
    input, textarea, select{
        padding:8px;
        font-size:14px;
    }

    /* heading */
    h1{
        font-size:22px;
        text-align:center;
    }

    /* fieldset spacing */
    fieldset{
        padding:8px;
    }

    /* labels */
    label{
        font-size:13px;
    }

    /* radio buttons (stack nicely) */
    .reason{
        display:flex;
        flex-direction:column;   /* 👈 important */
        gap:3px;
    }

    /* button */
    button{
        width:100%;
        padding:10px;
        font-size:15px;
    }

    /* select box */
    select{
        width:100%;
    }
}

<body>
    <div class="container">
    <form action="/portfolio.html" autocomplete="on" novalidate target="_blank">
                <h1>Leave Form</h1>
                <fieldset>
                    <legend>Student details</legend>
                <label >Student Name</label>
                <input type="text"><br>
                <label>Roll Number</label>
                <input type="roll number">
                <br>
                <label >Parents Contact Number</label>
                <input type="tel" placeholder="+91-12345-67890" pattern="\+91-[0-9]{5}-[0-9]{5}">
                <label>Email</label>
                <input type="email" >
                </fieldset>
                
                <label>Reason for leave</label><br>
                <textarea placeholder="enter your reaon here"></textarea><br><br>
                <label>Location</label><br>
                <label>
                    <input type="checkbox" name="Delhi">Delhi</label>
                    <br>
                <label><input type="checkbox" name="chandigarh">chandigarh</label><br>
                <label><input type="checkbox" name="home">home</label>
                <br><br>
                <label>Reason for going home</label><br>
                <div class="reason">
                <label><input type="radio" name="reason">Medical</label>
                <label><input type="radio" name="reason">Urgent</label>
                <label><input type="radio" name="reason">Marriage</label>
                <label><input type="radio" name="reason" onclick="ShowElem()">Other</label>
                <textarea id="other" placeholder="please specify here" style="display: none;"></textarea>
                </div>
                <br>
                <label>Enter a date after 4 FEB 2026</label>
                <input type="date" min="2026-02-04">
                <label>To</label>
                <input type="date" max="2026-04-28">
                <br>
                <label>Enter number of days</label>
                <input type="number" min="1" max="80" step="3" value="1">
                <br>
                <label>Select floor </label>
               <select size="3" multiple>
                <option value="first">first</option>
                <option value="second">second</option>
                <option value="third">third</option>
                <option value="third">third</option>
                <option value="third">third</option>
                <option value="third">third</option>
               </select>
               <button onclick="alert('Successfully submitted')" method="get" target="">Submit</button>

            </form>
            </div>
</body>
